name: Publish claude pack
on:
  push:
    tags:
      - "claude-v*"
permissions:
  id-token: write
  contents: read
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: always-further/agent-sign@main
        with:
          publish: "true"
          package-name: claude
          package-namespace: lukehinds
          package-version: ${{ github.ref_name }}
          package-path: claude
          registry-url: https://kszgig6yceav.share.zrok.io/api/v1
