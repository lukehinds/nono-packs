name: Publish claude pack
on:
  push:
    tags:
      - "claude-v*"
  workflow_dispatch: 
permissions:
  id-token: write
  contents: read
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: always-further/agent-sign@main
        with:
          publish: "true"
          package-name: claude
          package-namespace: lukehinds
          package-version: ${{ github.ref_name }}
          package-path: claude
          registry-url: https://packs.nono.sh/api/v1
          files: |
            .claude-plugin/plugin.json
            skills/nono-sandbox/SKILL.md
            hooks/hooks.json
            bin/nono-hook.sh
            bin/nono-hook-bash.sh
            package.json
